topic_id: SYS-ADR-13
title: ADR: Type-II Hypervisor Command Authority
tier: Tier-6-System
category: System-Architecture
tags: [adr, command-authority, type-ii-hypervisor, custodial-control]
abstract: |
  Decision record establishing that the master routing node (os-network-admin) must physically reside on the Executive's desk as a localized Type-II Virtual Machine, rather than being hosted on commercial cloud infrastructure.
details:
  the_cloud_vulnerability:
    rationale: "If the master routing node and cryptographic keys reside on AWS or GCP, the cloud provider ultimately owns the network. A state actor or corporate breach at the hyperscaler level would compromise the entire PPN."
  the_custodial_mandate:
    execution_rule: "The Command Authority (Node 3) runs as a Type-II VM within the secure Foundry Host (e.g., an iMac). It dials OUT to the cloud relay (Node 2) to join the mesh. The public internet cannot dial IN to the Command Authority, granting the Executive absolute, physical custodial control over the network's cryptographic keys."
links: [PPN-01, SYS-STRAT-01]
