topic_id: SYS-ADR-19
title: ADR: The Sovereign Airgap (Git for Knowledge)
tier: Tier-6-System
category: System-Architecture
tags: [adr, airgap, git, checkout, commit, hitl, f12-input-machine]
abstract: |
  Decision record establishing a Git-like Checkout/Commit workflow for institutional knowledge, mathematically forbidding the automated publishing of AI-generated content to Long-Term Support (LTS) ledgers.
details:
  the_automation_trap:
    rationale: "Hyperscaler 'Agentic AI' autonomously reads, writes, and publishes data. This is a catastrophic fiduciary liability. Automated merging introduces invisible hallucination creep into verified corporate ledgers."
  the_checkout_protocol:
    execution_rule: "The F8 Command Ledger (os-console) operates as a Checkout Gateway. Operators view AI-staged 'Overlays' and physically eject (Checkout) the raw Markdown/JSON drafts to their local, air-gapped desktop environments for native editing."
  the_commit_protocol:
    execution_rule: "The F12 Input Machine operates as the Commit Gateway. Operators drag-and-drop their human-verified, perfected files back into the Totebox. This explicit physical action constitutes the mathematical verification required to overwrite the LTS ledgers."
  independent_systems_boundary:
    execution_rule: "Totebox Orchestration (os-totebox, os-console) is strictly isolated from Independent Systems (os-mediakit, os-privategit). Independent Systems act solely as downstream consumers of the F12-verified LTS ledgers."
links: [SYS-ADR-17, SYS-ADR-18]
