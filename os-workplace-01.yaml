topic_id: os-workplace-01
title: Track 3 - State Projection & Machine-Readable Primitives
tier: Tier-4-OS
category: System-Architecture
tags: [workplace, state-projection, primitives, analog-exhaust, desktop]
abstract: |
  The human interface for the Digital First enterprise. We abandon the analog concept of "document editing" in favor of State Projection, rendering Machine-Readable Primitives into actionable interfaces.
details:
  operational_mandate: |
    Reject the legacy model of hiding user data inside proprietary, analog-simulating rendering engines (Word, Excel). Execute dedicated applications that interact exclusively with Machine-Readable Primitives (.yaml, .md, .csv, .json).
  state_projection: |
    Our interfaces do not edit documents; they act as rendering lenses for the underlying mathematical state. When a user interacts with the UI, they are executing a state change on the primitive data.
  analog_exhaust: |
    Legacy formats like .pdf are generated strictly as "Analog Exhaust"—dead, read-only cryptographic polaroids exported solely for external distribution to legacy parties who do not possess a Totebox Archive.
links: [sys-strat-01, sys-contracts-01]
