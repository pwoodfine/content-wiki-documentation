topic_id: topic-3d-asset-tokens
title: The 3-Dimensional Cryptographic Token
tier: Tier-6-System
category: System-Architecture
tags: [asset-token, 3d-data, leapfrog-2030, ontology]
abstract: |
  The formal definition of a Totebox Archive asset. We abandon the 2D analog "file" model in favor of living, 3-Dimensional Cryptographic Containers that prove their own provenance and context.
details:
  dimension_1_mass: "The physical /source data. The raw, immutable binary of an ingested asset (e.g., a scanned deed, an image, or an intact .eml payload) locked in WORM cold storage."
  dimension_2_ledger: "The machine-readable skeleton (.md, .yaml, .json). The distilled, structurally pure facts that describe the mass without proprietary rendering bloat."
  dimension_3_cognitive_state: "The taxonomic graph. The active metadata (Archetypes, Domains, Sentiments) stamped by the Semantic ALU, mathematically connecting the container to every other token in the network."
  the_asset_paradigm: "When transacting a Totebox Archive, you do not send an attachment. You grant access to a sovereign digital asset that contains its own raw material, explains its own context, and proves its own chain of custody."
links: [sys-adr-17, service-content-01]
