topic_id: SYS-ADR-14
title: ADR: Asynchronous UI/API Port Splitting
tier: Tier-6-System
category: System-Architecture
tags: [adr, port-splitting, nginx, proxy, ui, api]
abstract: |
  Decision record establishing the decoupling of the static HTML Presentation Chassis from the active Rust backend at the proxy layer.
details:
  the_architectural_conflict:
    rationale: "Routing both static UI requests and live API commands through a single backend port forces the Rust binaries to act as file servers, violating memory isolation and increasing the attack surface."
  the_port_split_mandate:
    execution_rule: "The Cloud Shield (Tier-2 NGINX) must route traffic asymmetrically based on the URI path."
    port_8888: "Location `/` routes to the Edge Node Web Server (Port 8888) strictly to fetch the static, lightning-fast HTML/CSS/JS Chassis."
    port_8080: "Location `/api/` or `/translate` routes directly down the WireGuard mesh to the active Rust daemon (Port 8080) for secure payload execution."
links: [SYS-ADR-11, PPN-01]
