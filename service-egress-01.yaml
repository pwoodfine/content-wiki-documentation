topic_id: service-egress-01
title: service-egress: The Sovereign Release Valve
tier: Tier-5-Service
category: Service-Logic
tags: [asymmetric-storage, physical-egress, zero-vendor-lock, cold-storage]
abstract: |
  The Asymmetric Storage Engine responsible for executing the Flow-Through Protocol. It guarantees absolute data sovereignty by physically bridging heavy cloud payloads back to local cold storage.
details:
  asymmetric_storage_paradigm: "Permanently decouples the lightweight semantic search index (/ledger) from the heavy payload (/source). The /ledger remains in the cloud for global microsecond search; the /source is physically ejected."
  the_chunked_bridge: "Mathematically slices heavy assets into strictly sized blocks (e.g., 50MB) and applies zstd compression, allowing users on degraded networks to incrementally drain their data without timeouts."
  the_asymmetric_wipe: "Once the local machine confirms cryptographic receipt of the chunks, service-egress issues a secure wipe command on the cloud Totebox, returning the SSD space to zero."
  zero_vendor_lock_in: "Eliminates the hyperscaler 'Data Gravity' tax. The Customer retains the search capabilities of a massive data lake on a $5/month cloud node, while holding the actual heavy assets on a $150 physical drive on their desk."
links: [sys-strat-01, topic-os-totebox]
