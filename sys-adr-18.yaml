topic_id: SYS-ADR-18
title: ADR: The Command Ledger HUD (Context-Aware Viewports)
tier: Tier-6-System
category: System-Architecture
tags: [adr, idi, hud, micro-frontend, os-console]
abstract: |
  Decision record defining the os-console as a strict Heads-Up Display (HUD) bridging the operator to the underlying Derivative Architecture, entirely bypassing the SaaS 'web app' trap.
details:
  the_hud_mandate:
    rationale: "The os-console is not a destination; it is a window into the LXC container that exists solely to route physical data back to the host OS desktop."
  cartridge_logic_mapping:
    F12_INPUT: "The Grounding Anchor. Rigid data-entry forcing the Human-in-the-Loop to assign the Chart of Accounts to Base Assets."
    F3_EMAIL_AND_F2_PEOPLE: "Querying the Index. Operators use natural language to search. The SLM translates the search into a query against the First Derivative. Outputs are physical .CSV Index Cards dropped to the desktop."
    F4_CONTENT: "Forging the Third Derivative. A brutalist text editor. The SLM acts as a localized marketing consultant, passively highlighting alignment with the First Derivative (Themes/Archetypes). Outputs are .MD files dropped to the desktop."
links: [SYS-ADR-11, SYS-ADR-17]
