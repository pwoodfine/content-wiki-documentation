topic_id: SYS-ADR-08
title: ADR: Systemd Quarantine & Process Supervision Debt
tier: Tier-6-System
category: System-Architecture
tags: [adr, systemd, technical-debt, quarantine, process-supervision]
abstract: |
  Decision record formally classifying the 'systemd' init system as a Quarantined Foreign Component. Acknowledges the temporary acceptance of this monolithic technical debt to facilitate rapid execution loops on legacy Debian cloud relays.
details:
  the_architectural_conflict:
    rationale: "The Sovereign Data Protocol mandates microkernel isolation and memory safety. 'systemd' violates this by acting as a 1.5-million-line C-based monolith running as PID 1, absorbing unrelated network and logging authorities."
  the_tactical_compromise:
    rationale: "Tier-2 Cloud Relays are currently deployed on Debian 12 (fleet-infrastructure-cloud), which is permanently entangled with systemd. Ripping it out would trigger kernel panic. We accept this debt to allow for 5-second automated ingestion loops via systemd service files."
  the_eradication_roadmap:
    rationale: "This debt will be eradicated when the Tier-2 Cloud Relays are migrated to system-substrate-freebsd or native seL4, utilizing minimalist text-based supervision (rc.d or runit) that respects the Capability-Based Manager."
links: [SYS-CORE-01, MOON-01, SYS-SUB-01]
