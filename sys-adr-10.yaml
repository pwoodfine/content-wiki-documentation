topic_id: SYS-ADR-10
title: ADR: The Fiduciary Anchor (F12 Input Machine)
tier: Tier-6-System
category: System-Architecture
tags: [adr, zero-form, fiduciary, human-in-the-loop, f12, base-asset]
abstract: |
  Decision record establishing the F12 Input Machine as the absolute Ground Truth anchor. Rejects complete AI automation in favor of strict Human-in-the-Loop data entry for base assets to prevent downstream ledger poisoning.
details:
  the_legacy_failure:
    rationale: "Hyperscaler architectures attempt to fully automate data categorization. If an AI autonomously sorts a source document into the wrong Chart of Accounts without human validation, the entire downstream database is mathematically poisoned."
  the_fiduciary_anchor:
    execution_rule: "The [F12] Input Machine is the primary Human-in-the-Loop tool. The human operator is the Oracle. They must manually select the Destination Totebox, the Service, and the Chart of Accounts to lock the Base Asset (.eml, .pdf) into immutable cold storage."
  slm_assistance_boundary:
    execution_rule: "The service-slm may silently evaluate inbound files to suggest a Chart of Accounts or Domain, but it is strictly forbidden from executing the commit. The human must physically click to authorize the ledger entry."
links: [SYS-ADR-17, OS-WORKPLACE-01]
