topic_id: SYS-ADR-07
title: ADR: Bifurcated Ingestion (Deterministic vs. Probabilistic)
tier: Tier-6-System
category: System-Architecture
tags: [adr, ingestion, slm, deterministic, mime, routing]
abstract: |
  Decision record establishing the strict routing parameters for inbound data. Forbids the universal application of Small Language Models (SLMs) to highly structured datasets, enforcing a bifurcated traffic direction model to prevent compute exhaustion and mathematical hallucination.
details:
  the_routing_mandate:
    execution_rule: "All ingestion gateways (e.g., app-console-input, service-email) must classify inbound payloads before processing. Payload type dictates the execution engine."
  path_a_deterministic:
    target_payloads: "Structured data (.csv, .json, .xlsx, telemetry logs)."
    execution_engine: "Dedicated Tier-5 services (e.g., service-people, app-mediakit-telemetry)."
    rationale: "Mathematical precision. Regex and structured parsing algorithms guarantee 100% accuracy and consume minimal compute resources. SLMs are strictly forbidden from processing this path."
  path_b_probabilistic:
    target_payloads: "Unstructured human data (email body text, .pdf, .docx)."
    execution_engine: "service-slm (The Linguistic Air-Lock)."
    rationale: "Semantic extraction. The SLM is deployed exclusively to strip noise from human communication and output structured facts into the self-healing knowledge graph."
  forensic_chain_of_custody:
    execution_rule: "Inbound compound files (e.g., MIME multipart .eml files) must be vaulted in their raw, unaltered state before extraction logic is applied. Splintering and routing occurs strictly as a secondary, non-destructive read operation."
links: [SYS-ADR-06, SERVICE-CONTENT-01, SERVICE-PEOPLE-01]
