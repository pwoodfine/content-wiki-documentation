topic_id: SYS-ADR-15
title: "ADR: The Manual Command Sequence (DARP Mirroring)"
tier: Tier-6-System
category: System-Security
tags: [command-sequence, darp, mirroring, sync, manual-authority]
abstract: |
  Establish the 'Manual Command Sequence' as the primary mechanism for state synchronization between the Foundry and Cloud Substrates. Reject automated background sync to eliminate cloud-based tampering risks.
details:
  the_push_execute_pull_loop:
    step_1_push: "The Command Authority initiates a manual 'Push' of the local Foundry state to the Cloud Substrate."
    step_2_execute: "The remote Node Authority executes a 'Context Audit' to verify the new physical state of the data mesh."
    step_3_pull: "The system 'Pulls' the audit report back to the Foundry for human verification."
  rationale:
    security: "Automated CI/CD pipelines introduce upstream vulnerability. Manual triggers ensure that the cloud only changes when a human operator physically authorizes the flow."
links: [SYS-SEC-01, SYS-STRAT-01, SYS-CONTRACTS-01]
