topic_id: SYS-ADR-11
title: ADR: Micro-Frontend Cartridge Architecture
tier: Tier-6-System
category: System-Architecture
tags: [adr, micro-frontend, chassis, cartridges, os-console]
abstract: |
  Decision record establishing the strict physical separation of the UI Presentation Chassis from the Data Execution Plugins (Cartridges).
details:
  the_chassis:
    component: os-console
    role: "The empty picture frame. Holds the global CSS, the F-Key routing logic, and the Machine-Based Authorization parameters. Contains zero business data."
  the_cartridges:
    component: app-console-*
    role: "Isolated HTML/JS fragments. They are completely unaware of the broader system. When an F-Key is struck, the Chassis dynamically mounts the specific Cartridge into the viewport using the native fetch() API."
links: [SYS-ADR-14, SYS-ADR-15]
