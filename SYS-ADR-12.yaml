topic_id: SYS-ADR-12
title: "ADR: Payload-Agnostic Flat-File Ledgers (The Payload Split)"
tier: Tier-4-OS
category: System-Architecture
tags: [flat-file, database, yaml, zero-execution, app-console-input]
abstract: |
  Reject opaque traditional SQL databases to maintain DARP compliance. Utilize a dual-directory, payload-agnostic flat-file ledger architecture to safely ingest legacy vendor binaries while maintaining deterministic machine-readability.
details:
  the_payload_split:
    component: app-console-input
    mandate: "Every file introduced to the system must be intercepted and split into two distinct entities: an inert blob and a smart pointer."
  directory_1_assets:
    path: "/assets/"
    contents: "External legacy binaries (.docx, .xlsx, .pdf) and internal sovereign formats (.md, .csv)."
    security: "Payload-agnostic storage. The kernel strictly strips all execution permissions. Files are treated as inert blobs."
  directory_2_ledger:
    path: "/ledger/"
    contents: "Strictly .yaml pointer files."
    mechanics: "For every file in /assets/, a matching .yaml file must exist here containing deterministic metadata and a cryptographic checksum."
  orchestration_read_cycle:
    mandate: "Totebox engines (service-content, service-people) must never scan /assets/ directly. They must parse the structured /ledger/ pointers to locate and verify required payloads."
links: [OS-WORKPLACE-01, SYS-CONTRACTS-01, app-console-input]
