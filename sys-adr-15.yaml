topic_id: SYS-ADR-15
title: ADR: Violent Cache-Busting Protocol (Anti-Phantom)
tier: Tier-6-System
category: System-Architecture
tags: [adr, cache, nginx, browser-state, fetch-api]
abstract: |
  Decision record establishing the mathematical eradication of browser caching for all Sovereign Command Ledgers.
details:
  the_browser_phantom_vulnerability:
    rationale: "Modern web browsers aggressively cache HTML/JS files behind Basic Authentication. This creates a 'Cache Phantom' where the operator sees an outdated UI state, potentially leading to catastrophic routing errors, Infinite Mirror UI loops, or misaligned physical execution."
  the_kernel_enforcement:
    execution_rule_1: "The NGINX Cloud Shield must inject violent cache-destroying headers into every outbound UI payload (no-store, no-cache, max-age=0)."
    execution_rule_2: "The Client-Side `fetch()` API must append a dynamic timestamp parameter (`?v=Date.now()`) to physically force the browser to request a fresh asset."
links: [SYS-ADR-14]
