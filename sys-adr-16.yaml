topic_id: SYS-ADR-16
title: ADR: Application-Level Unicast over WireGuard
tier: Tier-6-System
category: System-Architecture
tags: [adr, wireguard, udp, broadcast, mesh, enokey]
abstract: |
  Decision record establishing the architectural shift from native UDP broadcasting to an Application-Level Unicast loop to bypass WireGuard Layer-3 cryptographic limitations.
details:
  the_wireguard_paradox:
    rationale: "WireGuard operates strictly as a Layer-3 point-to-point cryptographic tunnel. Native subnet broadcasts (e.g., 10.50.0.255) fail with 'os error 126 (Required key not available)' because the kernel cannot assign a specific peer's public key to a broadcast address."
  the_unicast_mandate:
    execution_rule: "The F8 Control Plane (system-network-interface) is mathematically forbidden from utilizing UDP broadcast addresses. It must instead maintain an array of known Peer IP addresses and execute a high-speed Unicast Loop, injecting the payload to each node individually."
links: [PPN-01, TOPIC-UDP-01]
