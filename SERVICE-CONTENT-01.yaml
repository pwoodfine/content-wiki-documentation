topic_id: SERVICE-CONTENT-01
title: service-content: Asset & Knowledge Synthesis
tier: Tier-5-Service
category: Service-Logic
tags: [synthesis, legal, memo, comm, translate, totebox-orchestration, template-injection]
abstract: |
  A specialized engine for the structural synthesis of institutional knowledge. 
  It utilizes a Template-Injection Architecture to ensure strict separation between linguistic data and UI architecture.
details:
  human_narrative: |
    This service acts as the automated drafting core for the organization. Instead of manually 
    compiling scattered information, service-content securely ingests raw data and processes it 
    through distinct engines. It strictly isolates UI design from data synthesis, utilizing LLMs 
    solely for linguistics and Rust logic for structural assembly.
  engines:
    ENGINE_LEGAL: Manages governing rules.
    ENGINE_MEMO: Synthesizes source documents into refined memos.
    ENGINE_COMM:
      role: "Directs ingestion of external signals and enforces the State-Asset Distinction."
      standard: "ISO 24495-1 Plain Language"
      subject_line_logic: "[Project Name] — [lowercase status] [Title Case Document]"
    ENGINE_TRANSLATE: Manages cross-language parity and Spanish Glossary logic.
  compilation_mechanics:
    phase_1_ingestion: "Mount donor documents from /service-study/."
    phase_2_synthesis: "LLM extracts linguistics and formats as JSON payload."
    phase_3_injection: "Rust engine deterministically injects JSON into immutable HTML templates."
links: [TOTEBOX-01, SYS-GLOS-01, protocol-design.yaml]
