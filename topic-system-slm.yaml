topic_id: TOPIC-SYSTEM-SLM
title: The Semantic Router (Human-in-the-Loop SLM)
tier: Tier-6-System
category: System-Architecture
tags: [slm, semantic-routing, hitl, fiduciary-gateway]
abstract: |
  Defines the integration of Small Language Models (SLMs) as strictly bounded translators rather than autonomous executors, enforcing mandatory Human-in-the-Loop (HITL) authorization for all network actions.
details:
  the_autonomous_liability: "Permitting language models to execute network infrastructure commands based on probabilistic parsing introduces unacceptable operational risk and violates fiduciary control mandates."
  the_fiduciary_gateway: "system-slm functions exclusively as a compiler. It reads human intent and outputs a deterministic JSON proposal. The underlying mesh architecture will reject any command that has not received subsequent, explicit human authorization via the delivery terminal."
links: [SYS-ADR-10, TOPIC-SYSTEM-UDP]
